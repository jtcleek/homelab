services:
  babybuddy:
    image: lscr.io/linuxserver/babybuddy:2.7.1@sha256:aafa53779ed84b1be3af72f74e247535619f4892bdc9f679e903712c918c0c9b
    container_name: babybuddy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TZ=America/Chicago
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,https://babybuddy.cleek.xyz
    volumes:
      - data:/config
    restart: unless-stopped
volumes:
  data:
    driver: local
