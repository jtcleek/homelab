services:
  babybuddy:
    image: lscr.io/linuxserver/babybuddy:2.8.0@sha256:a5e46869eb5b45273fed84f967e0bb74c1711c4f5096338fe8685a9e869ecc05
    container_name: babybuddy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TZ=America/Chicago
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,https://babybuddy.cleek.xyz
    volumes:
      - data:/config
    restart: unless-stopped
volumes:
  data:
    driver: local
