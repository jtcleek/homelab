services:
  babybuddy:
    image: lscr.io/linuxserver/babybuddy:2.7.1@sha256:458f8dd193eeac81024c17b11fe89e35935985e24a1be9d1cc2f43630e942015
    container_name: babybuddy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TZ=America/Chicago
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,https://babybuddy.cleek.xyz
    volumes:
      - data:/config
    restart: unless-stopped
volumes:
  data:
    driver: local
