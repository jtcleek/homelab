services:
  babybuddy:
    image: lscr.io/linuxserver/babybuddy:2.8.0@sha256:bcde062c95e2f31c08bf97239221d9ca7d3247a7fc8ba4c11009828b86f44e3e
    container_name: babybuddy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TZ=America/Chicago
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,https://babybuddy.cleek.xyz
    volumes:
      - data:/config
    restart: unless-stopped
volumes:
  data:
    driver: local
