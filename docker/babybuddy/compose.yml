services:
  babybuddy:
    image: lscr.io/linuxserver/babybuddy:2.8.0@sha256:4e32a0641cb3da64c133396ef8721c1c0ac2ffc95e7f792380d9e426cc15b220
    container_name: babybuddy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TZ=America/Chicago
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,https://babybuddy.cleek.xyz
    volumes:
      - data:/config
    restart: unless-stopped
volumes:
  data:
    driver: local
