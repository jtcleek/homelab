services:
  babybuddy:
    image: lscr.io/linuxserver/babybuddy:2.7.1@sha256:d1393ec5d4e77af63a0983e981c1cc5c2494ce80274965ec0325dd9b9a9fe2e6
    container_name: babybuddy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TZ=America/Chicago
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,https://babybuddy.cleek.xyz
    volumes:
      - data:/config
    restart: unless-stopped
volumes:
  data:
    driver: local
