services:
  babybuddy:
    image: lscr.io/linuxserver/babybuddy:2.8.0@sha256:5c9d8f7128a0824b03fb542d2219c3b961f1c201cc15121d12785a3b7dd98038
    container_name: babybuddy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - TZ=America/Chicago
      - CSRF_TRUSTED_ORIGINS=http://127.0.0.1:8000,https://babybuddy.cleek.xyz
    volumes:
      - data:/config
    restart: unless-stopped
volumes:
  data:
    driver: local
